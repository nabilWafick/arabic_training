            --cream-light: #FAF7F2;
            --cream-dark: #F0EAE0;
            --navy: #1A1A2E;
            --navy-light: #2D2D44;
            --gold: #C9A85C;

            --border: #E8E3D6;

            --warning: #F59E0B;
            --error: #EF4444;

        html { scroll-behavior: smooth; }
        body {

            color: var(--navy);

            font-size: 16px;

        h2 { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 700; margin-bottom: 0.4em; color: var(--navy); }
        h3 { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 600; margin-bottom: 0.5em; color: var(--navy); }
        h4 { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 600; margin-bottom: 0.6em; color: var(--navy); }
        h5 { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 600; color: var(--navy); }

        .arabic-body { font-family: 'Amiri', serif; direction: rtl; text-align: right; }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: white;
            padding: 12px 28px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: 'Crimson Pro', serif;
            font-size: 15px;
            transition: all 0.3s;
            box-shadow: var(--shadow);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-secondary {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 10px 26px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Crimson Pro', serif;
            transition: all 0.3s;
        }
        .btn-secondary:hover { background: var(--cream-dark); }
        
        .btn-small { padding: 8px 16px; font-size: 14px; }
        
        .card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 28px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }
        .card:hover { box-shadow: var(--shadow-lg); border-color: var(--gold); transform: translateY(-2px); }
        .card-accent { border-left: 5px solid var(--gold); }
        
        .phase-header {
            background: linear-gradient(135deg, var(--navy), var(--navy-light));
            color: white;
            padding: 40px;
            border-radius: 12px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }
        .phase-header::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(201,168,92,0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .phase-header-content { position: relative; z-index: 1; }
        .phase-numeral { 
            font-family: 'Playfair Display', serif;
            font-size: 4em;
            font-weight: 800;
            color: var(--gold-light);
            opacity: 0.8;
            margin-bottom: 10px;
        }
        .phase-title { font-size: 2.2em; margin-bottom: 0.2em; font-weight: 700; }
        .phase-subtitle { font-size: 1.1em; opacity: 0.9; margin-bottom: 20px; }
        
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin: 20px 0;
        }
        .stat-box {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 16px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-number { font-size: 1.8em; font-weight: 700; color: var(--gold-light); }
        .stat-label { font-size: 0.9em; opacity: 0.9; margin-top: 4px; }
        
        .badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-gold { background: rgba(201, 168, 92, 0.15); color: var(--gold-dark); }
        .badge-success { background: rgba(34, 197, 94, 0.15); color: #16a34a; }
        .badge-warning { background: rgba(245, 158, 11, 0.15); color: #d97706; }
        .badge-error { background: rgba(239, 68, 68, 0.15); color: #dc2626; }
        .badge-info { background: rgba(59, 130, 246, 0.15); color: #2563eb; }
        
        .progress-bar {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin: 12px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold), var(--gold-dark));
            transition: width 0.4s ease;
        }
        
        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 2px solid var(--border);
            margin-bottom: 24px;
            overflow-x: auto;
        }
        .tab {
            padding: 16px 20px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Pro', serif;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .tab:hover { color: var(--gold); }
        .tab.active {
            color: var(--navy);
            border-bottom-color: var(--gold);
        }
        
        .theory-section {
            background: var(--cream-light);
            padding: 24px;
            border-radius: 10px;
            border-left: 5px solid var(--gold);
            margin: 20px 0;

            margin-left: 24px;
            margin-bottom: 16px;
        }
        .theory-section li { margin-bottom: 10px; }

            border: 2px solid var(--gold-light);
            border-radius: 8px;
            padding: 16px;
            margin: 16px 0;
            font-family: 'Amiri', serif;

        .example-label { font-weight: 600; color: var(--gold-dark); margin-bottom: 8px; }

            width: 100%;
            border-collapse: collapse;
            background: white;
            margin: 20px 0;
            box-shadow: var(--shadow);
        }
        .planning-table thead {
            background: linear-gradient(135deg, var(--navy), var(--navy-light));
            color: white;
        }
        .planning-table th {
            padding: 14px;
            text-align: left;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .planning-table td {
            padding: 14px;
            border-bottom: 1px solid var(--border);
        }
        .planning-table tbody tr:hover { background: var(--cream-light); }
        .planning-table .type-badge { color: var(--gold); font-weight: 600; font-size: 13px; }
        
        .exercise-card {
            background: var(--white);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 24px;
            margin: 20px 0;
            transition: all 0.3s;
        }
        .exercise-card:hover { border-color: var(--gold); box-shadow: var(--shadow-lg); }
        .exercise-card.answered { background: var(--cream-light); border-color: var(--gold); }
        
        .exercise-difficulty {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 16px;
        }
        .diff-easy { background: rgba(34, 197, 94, 0.15); color: #16a34a; }
        .diff-medium { background: rgba(245, 158, 11, 0.15); color: #d97706; }
        .diff-hard { background: rgba(239, 68, 68, 0.15); color: #dc2626; }
        
        .option {
            background: var(--cream-light);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 14px;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .option:hover { border-color: var(--gold); background: var(--cream-dark); }
        .option.selected { border-color: var(--gold); background: rgba(201, 168, 92, 0.1); }
        .option.correct { border-color: var(--success); background: rgba(34, 197, 94, 0.1); }
        .option.incorrect { border-color: var(--error); background: rgba(239, 68, 68, 0.1); }
        
        .explanation-box {
            background: var(--cream-light);
            border-left: 4px solid var(--gold);
            border-radius: 6px;
            padding: 16px;
            margin: 16px 0;
        }
        .explanation-label { font-weight: 700; color: var(--gold-dark); margin-bottom: 8px; }
        
        .resources-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .resource-card {
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            background: white;
            transition: all 0.3s;
        }
        .resource-card:hover { border-color: var(--gold); box-shadow: var(--shadow-lg); }
        .resource-icon { font-size: 2em; margin-bottom: 12px; }
        .resource-title { font-weight: 600; margin-bottom: 8px; }
        .resource-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
        
        .content-section {
            margin-bottom: 40px;
        }
        
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 24px;
        }
        
        .objectives-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin: 20px 0;
        }
        .objectives-list li {
            list-style: none;
            padding-left: 30px;
            position: relative;
            line-height: 1.8;
        }
        .objectives-list li:before {
            content: "◆";
            position: absolute;
            left: 0;
            color: var(--gold);
            font-weight: bold;
        }
        
        .competencies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin: 20px 0;
        }
        .competency-item {
            background: rgba(201, 168, 92, 0.08);
            border: 1px solid rgba(201, 168, 92, 0.2);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: var(--gold-dark);
        }
        
        .quiz-progress {
            display: flex;
            gap: 8px;
            margin: 16px 0;
            flex-wrap: wrap;
        }
        .question-indicator {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            background: var(--border);
            color: var(--text-secondary);
        }
        .question-indicator.answered { background: var(--success); color: white; }
        .question-indicator.current { background: var(--gold); color: white; }
        
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            h2 { font-size: 1.6rem; }
            .phase-header { padding: 24px; }
            .phase-numeral { font-size: 2.5em; }
            .phase-title { font-size: 1.6em; }
            .grid-2 { grid-template-columns: 1fr; }
            .objectives-list { grid-template-columns: 1fr; }
        }
    </style>
</head>

<p><strong>3. Kasra (ِ) - The 'I' Sound</strong></p>
<p>Looks like a small line below the letter. Pronounced like 'i' in "sit" or "feet".</p>

                                    <div className="resource-icon">{r.icon}</div>
                                    <div className="resource-title">{r.title}</div>
                                    <div className="resource-desc">{r.desc}</div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }
        
        function PhaseView({ phase, onSelectLesson, onBack }) {
            return (
                <div style={{paddingBottom: "40px"}}>
                    <button className="btn-secondary btn-small" onClick={onBack} style={{marginBottom: "24px"}}>
                        ← Back to Dashboard
                    </button>
                    
                    <div className="phase-header">
                        <div className="phase-header-content">
                            <div className="phase-numeral">{phase.numeral}</div>
                            <h2 className="phase-title">{phase.title}</h2>
                            <div className="phase-subtitle">{phase.titleAr}</div>
                            <div className="stats-row">
                                <div className="stat-box">
                                    <div className="stat-number">{phase.duration}</div>
                                    <div className="stat-label">Duration</div>
                                </div>
                                <div className="stat-box">
                                    <div className="stat-number">{phase.lessons.length}</div>
                                    <div className="stat-label">Lessons</div>
                                </div>
                                <div className="stat-box">
                                    <div className="stat-number">{phase.level}</div>
                                    <div className="stat-label">Level</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div style={{maxWidth: "900px", margin: "0 auto"}}>
                        <h3 style={{marginBottom: "20px"}}>Phase Objectives</h3>
                        <ul className="objectives-list">
                            {phase.objectives.map((obj, i) => (
                                <li key={i}>{obj}</li>
                            ))}
                        </ul>
                        
                        <h3 style={{marginTop: "40px", marginBottom: "20px"}}>Competencies to Master</h3>
                        <div className="competencies-grid">
                            {phase.competencies.map((comp, i) => (
                                <div key={i} className="competency-item">{comp}</div>
                            ))}
                        </div>
                        
                        <h3 style={{marginTop: "40px", marginBottom: "20px"}}>Lessons in This Phase</h3>
                        <div style={{display: "grid", gap: "16px"}}>
                            {phase.lessons.map((lesson, i) => (
                                <div
                                    key={i}
                                    className="card card-accent"
                                    onClick={() => onSelectLesson(lesson)}
                                    style={{cursor: "pointer"}}
                                >
                                    <h4>{lesson.number}. {lesson.title}</h4>
                                    <div className="arabic" style={{fontSize: "1em", marginBottom: "10px"}}>{lesson.titleAr}</div>
                                    <p style={{color: "#666", fontSize: "14px"}}>
                                        {lesson.objectives && lesson.objectives.slice(0, 2).map((obj, j) => (
                                            <div key={j}>• {obj}</div>
                                        ))}
                                        {lesson.objectives && lesson.objectives.length > 2 && <div>• ... and more</div>}
                                    </p>
                                    <div style={{marginTop: "12px", display: "flex", gap: "20px", fontSize: "13px", color: "#999"}}>
                                        <span>⏱️ {lesson.duration}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }
        
        function Dashboard({ data, onPhaseSelect, onLessonSelect }) {
            return (
                <div style={{maxWidth: "1000px", margin: "0 auto", paddingBottom: "60px"}}>
                    <div style={{marginBottom: "40px"}}>
                        <h1>Welcome to ArabicMaster Pro</h1>
                        <p style={{fontSize: "1.1em", color: "#666", marginTop: "12px"}}>
                            Your comprehensive Arabic learning platform with 40+ lessons and 200+ exercises
                        </p>
                    </div>
                    
                    {/* Quick Stats */}
                    <div className="stats-row" style={{marginBottom: "40px"}}>
                        <div className="card">
                            <div style={{fontSize: "1.4em", fontWeight: "700", color: "var(--gold)"}}>
                                {CURRICULUM.phases.reduce((sum, p) => sum + p.lessons.length, 0)}
                            </div>
                            <div style={{fontSize: "0.9em", color: "#666"}}>Total Lessons</div>
                        </div>
                        <div className="card">
                            <div style={{fontSize: "1.4em", fontWeight: "700", color: "var(--gold)"}}>
                                5
                            </div>
                            <div style={{fontSize: "0.9em", color: "#666"}}>Learning Phases</div>
                        </div>
                        <div className="card">
                            <div style={{fontSize: "1.4em", fontWeight: "700", color: "var(--gold)"}}>
                                200+
                            </div>
                            <div style={{fontSize: "0.9em", color: "#666"}}>Total Questions</div>
                        </div>
                    </div>
                    
                    <h2 style={{marginBottom: "24px"}}>Learning Phases</h2>
                    <div style={{display: "grid", gap: "24px"}}>
                        {CURRICULUM.phases.map((phase, i) => (
                            <div
                                key={phase.id}
                                className="card"
                                onClick={() => onPhaseSelect(phase)}
                                style={{cursor: "pointer"}}
                            >
                                <div style={{display: "flex", justifyContent: "space-between", alignItems: "start", marginBottom: "16px"}}>
                                    <div>
                                        <div style={{fontSize: "0.85em", fontWeight: "700", color: "var(--gold)", textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: "4px"}}>
                                            Phase {phase.id}
                                        </div>
                                        <h3 style={{marginTop: 0}}>{phase.title}</h3>
                                        <div className="arabic">{phase.titleAr}</div>
                                    </div>
                                    <span style={{fontSize: "2em", opacity: 0.5}}>
                                        {phase.numeral === "I" ? "Ⅰ" : phase.numeral === "II" ? "Ⅱ" : phase.numeral === "III" ? "Ⅲ" : ""}
                                    </span>
                                </div>
                                <p style={{color: "#666", marginBottom: "12px"}}>
                                    {phase.objectives.slice(0, 3).map((obj, j) => (
                                        <div key={j} style={{fontSize: "0.9em"}}>• {obj}</div>
                                    ))}
                                </p>
                                <div style={{marginTop: "16px", display: "flex", gap: "20px", fontSize: "13px", color: "#999"}}>
                                    <span>📚 {phase.lessons.length} lessons</span>
                                    <span>⏱️ {phase.duration}</span>
                                    <span>📊 {phase.level}</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }
        
        // ============================================
        // MAIN APP
        // ============================================
        
        function App() {
            const [data, setData] = React.useState(() => Storage.init());
            const [view, setView] = React.useState("dashboard");
            const [selectedPhase, setSelectedPhase] = React.useState(null);
            const [selectedLesson, setSelectedLesson] = React.useState(null);
            
            const handlePhaseSelect = (phase) => {
                setSelectedPhase(phase);
                setView("phase");
            };
            
            const handleLessonSelect = (lesson) => {
                setSelectedLesson(lesson);
                setView("lesson");
            };
            
            const handleBack = () => {
                if (view === "lesson") {
                    setView("phase");
                } else if (view === "phase") {
                    setView("dashboard");
                }
            };
            
            return (
                <div style={{background: "var(--cream)", minHeight: "100vh"}}>
                    {/* Header */}
                    <header style={{
                        background: "linear-gradient(135deg, var(--navy), var(--navy-light))",
                        color: "white",
                        padding: "20px 40px",
                        boxShadow: "var(--shadow-md)",
                        position: "sticky",
                        top: 0,
                        zIndex: 100
                    }}>
                        <div style={{maxWidth: "1200px", margin: "0 auto", display: "flex", justifyContent: "space-between", alignItems: "center"}}>
                            <div>
                                <h1 style={{margin: 0, fontSize: "1.8em", fontFamily: "'Playfair Display', serif"}}>ArabicMaster Pro</h1>
                                <div style={{fontSize: "0.85em", opacity: 0.9, fontStyle: "italic"}}>Professional Arabic Learning Platform</div>
                            </div>
                            <div style={{fontSize: "2em"}}>📚</div>
                        </div>
                    </header>
                    
                    {/* Main Content */}
                    <main style={{padding: "40px 20px"}}>
                        {view === "dashboard" && <Dashboard data={data} onPhaseSelect={handlePhaseSelect} onLessonSelect={handleLessonSelect} />}
                        {view === "phase" && selectedPhase && <PhaseView phase={selectedPhase} onSelectLesson={handleLessonSelect} onBack={handleBack} />}
                        {view === "lesson" && selectedLesson && <LessonView lesson={selectedLesson} onBack={handleBack} />}
                    </main>
                    
                    {/* Footer */}
                    <footer style={{
                        background: "var(--navy-light)",
                        color: "white",
                        padding: "30px 40px",
                        textAlign: "center",
                        opacity: 0.9
                    }}>
                        <p style={{margin: 0, fontSize: "0.9em"}}>
                            © 2024 ArabicMaster Pro — Professional Arabic Learning • Designed for Deep Comprehension
                        </p>
                    </footer>
                </div>
            );
        }
        
        // ============================================
        // RENDER
        // ============================================
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
