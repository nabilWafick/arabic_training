version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: arabicmaster_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arabicmaster}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arabicmaster_secret}
      POSTGRES_DB: ${POSTGRES_DB:-arabicmaster}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arabicmaster}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Adminer - Database management UI (optional, for development)
  adminer:
    image: adminer:latest
    container_name: arabicmaster_adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: arabicmaster_network
